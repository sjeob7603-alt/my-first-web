<div id="login-box" style="text-align: center; margin: 50px;">
    <h2> 🔒 시스템 인증이 필요합니다</h2>
    <input type="text" id="userld" placeholder="사용자 이름" /><br>
    <input type="password" id="userPw" placeholder="암호 입력" /><br>
    <button onclick="checkLogin()">입장하기</button>
</div>


    <div id="secret-area" style="display: none;">
        <h3 style="color: #2e7d32;">🖐️ <span id="user-display"></span>님, 반갑습니다!</h3>
    <main>
       <div class="display-box">
        <img id="targetlmg" src="./image/crop1.jpg" style="width: 100%;
        max-width: 500px;"/>
        <p id="targetDese">4월 7일:감자 첫 수확!</p>
        
       </div>

       <div class="thumb-list">
        <img src="./image/crop1.jpg "
        onclick="show('./image/crop1.jpg','4월 7일: 감자 첫 수확!')"/>
        <img src="./image/crop2.jpg"
        onclick="show('./image/crop2.jpg','4월 9일:비료 주기 실습 완료')"/>
        <img src="./image/img.감자전.jpg"
        onclick="show('./image/img.감자전.jpg','4월 10일 수확한 감자로 감자전')"/>
        <img src="./image/img.감자도리.jpg"
        onclick="show('./image/img.감자도리.jpg','좋아하는 감자 캐릭터')"/>
        <img src="./image/img.감자튀김.jpg"
        onclick="show('./image/img.감자튀김.jpg','감자로 만든 감자튀김')"/>
        <img src="./image/img.포카칩.jpg"
        onclick="show('./image/img.포카칩.jpg','좋아하는 감자 과자')"/>
        <img src="./image/img.감자전.jpg"
        onclick="show('./image/img.감자전.jpg','감자로 만든 전!!')"/>
        <img src="./image/img.스마일감자.jpg"
        onclick="show('./image/img.스마일감자.jpg','감자를 귀여운 모양으로 만든 스마일 감자튀김')"/>
        <img src="./image/img.스마일 감자 떡볶이.jpg"
        onclick="show('./image/img.스마일 감자 떡볶이.jpg','스마일감자가 들어간 떡볶이')"/>
        <img src="./image/img.감자면.jpg"
        onclick="show('./image/img.감자면.jpg','감자로 면을 만든 감자면!!')"/>
        </div>
    </main>
    <div id="settings" style="margin-top: 30px; padding: 20px; border: 1px solid #ddd; background: #fff;">
                    <h4> 🗝️시스템 보안 설정</h4>
                    <p style="font-size: 0.9em; color: #666;">보안을 위해 정기적으로 비밀번호를 변경해 주세요.</p>
                    <input type="password" id="newPw" placeholder="새 비밀번호 입력" />
                    <button onclick="changePassword()">비밀번호 변경</button>
                    <button onclick="logout()">로그아웃</button>
        </div>

<script>
    // imgPath: 클릭한 사진의 주소 / text:클릭한 사진 설명
    function show(imgPath,text) {
        // 메인 전광한
        document.getElementById("targetlmg").src=imgPath;

        // 메인 전광판 설명 글자
        document.getElementById("targetDese").innerText=text
    }
    function checkLogin(){
        //1.입력된 암호 읽기
        let name = document.getElementById("userld").value
        let pw = document.getElementById("userPw").value;

        // 금고에서 비밀번호 가져와
        let currentPw = localStorage.getItem("userPassword") || "1234";

        if (pw === currentPw && name !== "") {
            // 밑바탕
            localStorage.setItem("isLoggedIn", "true");
            localStorage.setItem("savedName", currentPw);
            localStorage.setItem("userPassword", currentPw);


            alert(name + "님, 인증 정보가 저장소에 기록되었습니다.");

        
            // 상태변형
            document.getElementById("login-box").style.display = "none";
            document.getElementById("secret-area").style.display = "block";
             document.getElementById("user-display").innerText = name;

        } else {
            alert("이름을 입력하지 않았거나 암호가 틀렸습니다.");
        }
    }
    window.onload = function() {
        let isLoggedIn = localStorage.getItem("isLoggedIn");

        let savedName = localStorage.getItem("savedName");

        if (isLoggedIn === "true") {
            document.getElementById("login-box").style.display = "none";
            document.getElementById("secret-area").style.display = "block";
            document.getElementById("user-display").innerText = savedName;
        }
    };
    function changePassword() {
        let newPw = document.getElementById("newPw").value;
        if (newPw.length < 4) { alert("암호는 4자리 이상이어야 합니다."); return; }
        localStorage.setItem("userPassword", newPw);
        alert("비밀번호가 변경되었습니다.");
    }
    function logout() {
        if (confirm("로그아웃 하시겠습니까?")) {
            localStorage.removeItem("isLoggedIn");
            localStorage.removeItem("savedName");
            location.href = "index.html";
        }
    }
</script>
