<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 웹 페이지</title>
    <style>
        .receipt-box {
            display: none;
            border: 1px solid #ccc;
            padding: 20px;
            margin-top: 20px;
            background-color: #f9f9f9;
        }
        .input-group { margin-bottom: 10px; }
        .step-guide span { margin-right: 10px; }
    </style>
</head>

<body>
    <header>
        <h1>좋았다면 추억, 싫었다면 경험</h1>
    </header>
    
    <nav>
        <a href="index.html">홈으로</a>
        <a href="subject.html">/진로 탐구</a>
    </nav>

    <main>
        <section class="agriculture-portfolio">
            <article class="crass-item">
                <figure class="crop-image">
                    <img src="./image/감자.jpg" style="width:200px; height:auto;">
                    <figcaption>그림1. 본인이 직접 재배한 농작물 실물</figcaption>
                </figure>

                <div class="crop-details">
                    <h3>농작물 명칭: 감자</h3>
                    <section class="info-block">
                        <h4>재배 생산 및 특성</h4>
                        <ul>
                            <li><strong>품종:</strong> 수미감자, 대지감자, 셰퍼드 감자, 러셋 감자</li>
                            <li><strong>재배 환경:</strong> 시설재배 등</li>
                        </ul>
                    </section>

                    <section class="info-block distribution">
                        <h4>유통 구조 설계</h4>
                        <div class="step-guide">
                            <span>생산자(나)</span> ➔ <span>로컬푸드 직매장</span> ➔ <span>최종 소비자</span>
                        </div>
                        <br>
                        <ul>
                            <li>
                                <strong>물류 방식:</strong> 감자는 수확 후 세척과 선별을 거쳐 분류됩니다. 저온 유통(cold chain)을 활용합니다.
                            </li>
                            <li><strong>판매전략:</strong> 직거래 / 온라인 마켓 등</li>
                        </ul>
                    </section>
                </div>
            </article>
        </section>

        <section id="order-ares">
            <hr>
            <h2>온라인 주문하기</h2>
            <form>
                <div class="input-row">
                    <div class="input-group">
                        <label>주문자 성함</label>
                        <input type="text" id="userName" placeholder="실명을 입력하세요">
                    </div>
                    <div class="input-group">
                        <label>연락처</label>
                        <input type="text" id="userPhone" placeholder="010-0000-0000">
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="unitWeight">구매 단위 선택</label>
                        <select id="unitWeight">
                            <option value="15000">유기농 감자 1kg (15,000원)</option>
                            <option value="40000">유기농 감자 3kg (40,000원)</option>
                            <option value="60000">유기농 감자 5kg (60,000원)</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="quantity">주문 수량 (박스)</label>
                        <input type="number" id="quantity" value="1" max="10">
                    </div>
                </div>

                <div class="input-group">
                    <label>배송 방식 선택</label>
                    <select id="deliveryFee">
                        <option value="3000">일반택배 (3,000원)</option>
                        <option value="5000">신선 새벽 배송(5,000원)</option>
                        <option value="0">광주 로컬푸드 매장 픽업 (무료)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>배송 메세지</label>
                    <textarea id="userMessage" placeholder="부재 시 문 앞에 놓아주세요"></textarea>
                </div>

                <button type="button" class="order-btn" onclick="processOrder()">지금 바로 주문 완료</button>

                <div id="receipt" class="receipt-box"></div>
            </form>
        </section>
    </main>

    <script>
        function processOrder() {
            // 1. 데이터 가져오기
            let name = document.getElementById('userName').value;
            let phone = document.getElementById('userPhone').value;
            let quantity = Number(document.getElementById("quantity").value); // 오타 수정
            let deliveryFee = Number(document.getElementById("deliveryFee").value);

            // 2. 선택한 상품 정보
            let unitsSelect = document.getElementById("unitWeight");
            let productPrice = Number(unitsSelect.value); // doitSelect -> unitsSelect로 수정
            let productName = unitsSelect.options[unitsSelect.selectedIndex].text;

            // 3. 가격 계산 및 무료 배송 조건
            let basePrice = productPrice * quantity;
            if (basePrice >= 30000) {
                deliveryFee = 0;
            }

            let totalPrice = basePrice + deliveryFee;
            let message = document.getElementById("userMessage").value;

            // 4. 유효성 검사 및 시간
            let dateString = new Date().toLocaleString(); // Dats -> Date 수정

            if (name === "" || phone === "") { // phoen -> phone 수정
                alert("⚠️ 성함과 연락처를 모두 입력해 주세요!");
                return;
            }

            // 5. 영수증 출력
            let receipt = document.getElementById('receipt');
            receipt.innerHTML = `
                <h3> 🧾 주문 확인 영수증</h3>
                <p style="color:gray; font-size:0.8em;">주문 시각: ${dateString}</p>
                <hr>
                <p><strong>주문자:</strong> ${name} 님</p>
                <p><strong>연락처:</strong> ${phone} </p>
                <p><strong>주문상품:</strong> ${productName}</p>
                <p><strong>주문수량:</strong> ${quantity}박스</p>
                <p><strong>배송비:</strong> ${deliveryFee === 0 ? "무료배송" : deliveryFee.toLocaleString() + "원"}</p>
                <p><strong>요청사항:</strong> ${message || "없음"}</p>
                <hr>
                <p style="font-size: 1.2em;"><strong>총 결제 금액: 
                <span style="color:red;">${totalPrice.toLocaleString()}원</span></strong></p>
                <p style="text-align:center;">주문해 주셔서 감사합니다! 🍯</p>
            `;

            receipt.style.display = "block";
        }
    </script>
</body>
</html>
